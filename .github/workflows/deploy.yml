name: Deploy to GitHub Pages

on:
  push:
    branches: [ W40k_Necrons ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish W40k_CheatSheet.Client/W40k_CheatSheet.Client.csproj -c Release -o output

      - name: Fix base href for GitHub Pages
        run: sed -i 's|<base href="/" />|<base href="/W40k_CheatSheet/" />|g' output/wwwroot/index.html

      - name: Copy index.html to 404.html for SPA routing
        run: cp output/wwwroot/index.html output/wwwroot/404.html

      - name: Add .nojekyll
        run: touch output/wwwroot/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
