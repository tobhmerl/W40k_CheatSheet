name: Deploy to GitHub Pages

on:
  push:
    branches: [ Imperium_Secundus ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Clean and Publish
        run: |
          dotnet clean W40k_CheatSheet.Client/W40k_CheatSheet.Client.csproj -c Release
          dotnet publish W40k_CheatSheet.Client/W40k_CheatSheet.Client.csproj -c Release -o output --no-cache

      - name: Use source index.html and CSS (publish strips customizations)
        run: |
          cp W40k_CheatSheet.Client/wwwroot/index.html output/wwwroot/index.html
          cp W40k_CheatSheet.Client/wwwroot/css/app.css output/wwwroot/css/app.css

      - name: Fix paths for GitHub Pages
        run: |
          FILE=output/wwwroot/index.html
          sed -i 's|<base href="/" />|<base href="/W40k_CheatSheet/" />|g' "$FILE"
          sed -i "s|url('images/|url('/W40k_CheatSheet/images/|g" "$FILE"
          echo "=== Final index.html ==="
          cat "$FILE"

      - name: Copy index.html to 404.html for SPA routing
        run: cp output/wwwroot/index.html output/wwwroot/404.html

      - name: Add .nojekyll
        run: touch output/wwwroot/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
