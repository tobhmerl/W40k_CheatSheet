<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="W40k_CheatSheet.Client.styles.css" />
</head>

<body>
    <div id="app">
        <div style="text-align:center;padding:3rem 1rem;font-family:sans-serif;color:#eee;background:#000;min-height:100vh">
            <h1>⚔️ W40k CheatSheet</h1>
            <p>Loading…</p>
        </div>
    </div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script>
        window.scrollToElement = function (id) {
            var el = document.getElementById(id);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        window.copyToClipboard = function (text) {
            return navigator.clipboard.writeText(text).then(function () { return true; }, function () { return false; });
        };
        window.getUrlFragment = function () {
            return window.location.hash || '';
        };
        window.clearUrlFragment = function () {
            history.replaceState(null, '', window.location.pathname + window.location.search);
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
